name: Build and deploy Next.js app to Azure Web App - mindmate-frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend-next/**"
      - ".github/workflows/main_mindmate-frontend.yml"
  workflow_dispatch:

env:
  APP_PATH: ./frontend-next
  NODE_VERSION: "22.x"
  AZURE_WEBAPP_NAME: mindmate-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.APP_PATH }}

      - name: Build Next.js app
        run: npm run build
        working-directory: ${{ env.APP_PATH }}
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-next-app
          path: ${{ env.APP_PATH }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-next-app
          path: ./frontend-next

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./frontend-next
