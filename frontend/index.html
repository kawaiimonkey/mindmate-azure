<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMate - Your Web Wellness Companion</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --sage: #8BAF93; --sage-dark: #6D9B78;
            --lavender: #B8A9CC; --lavender-dark: #9A87B8;
            --cream: #FAF7F2; --charcoal: #2D2D2D; --muted: #7A7A7A;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .hero-container {
            max-width: 1200px; width: 90%;
            display: flex; align-items: center; justify-content: space-between; gap: 60px;
        }
        .hero-content { flex: 1; max-width: 500px; }
        .logo-wrapper { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .logo-mark {
            width: 50px; height: 50px; border-radius: 12px;
            background: linear-gradient(135deg, var(--sage), var(--lavender));
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            box-shadow: 0 10px 20px rgba(139,175,147,0.3);
        }
        .logo-text { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--charcoal); }
        h1 { font-family: 'DM Serif Display', serif; font-size: 3.5rem; color: var(--charcoal); line-height: 1.1; margin-bottom: 20px; }
        p.subtitle { color: var(--muted); font-size: 1.1rem; line-height: 1.6; margin-bottom: 40px; }
        .action-buttons { display: flex; gap: 20px; margin-bottom: 30px; }
        .btn-base {
            padding: 16px 32px; color: white; text-decoration: none; border-radius: 12px;
            font-weight: 500; font-size: 1.05rem; transition: all 0.2s; display: inline-block;
        }
        .btn-primary { background: linear-gradient(135deg, var(--sage), var(--sage-dark)); box-shadow: 0 8px 20px rgba(139,175,147,0.4); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(139,175,147,0.5); }
        .btn-secondary { background: linear-gradient(135deg, var(--lavender), var(--lavender-dark)); box-shadow: 0 8px 20px rgba(184,169,204,0.4); }
        .btn-secondary:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(184,169,204,0.5); }
        .footer-note { font-size: 0.85rem; color: var(--muted); }
        .hero-visual { flex: 1; display: flex; justify-content: center; position: relative; }
        .glass-card {
            width: 450px; height: 500px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 30px 60px rgba(139,175,147,0.15);
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .blob { position: absolute; border-radius: 50%; filter: blur(40px); opacity: 0.6; z-index: -1; }
        .blob.green { width: 300px; height: 300px; background: var(--sage); top: -50px; right: -50px; }
        .blob.purple { width: 250px; height: 250px; background: var(--lavender); bottom: -20px; left: -20px; }
        .glass-card h3 { font-family: 'DM Serif Display', serif; color: var(--charcoal); font-size: 1.8rem; text-align: center; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="hero-container">
        <div class="hero-content">
            <div class="logo-wrapper">
                <div class="logo-mark">M</div>
                <div class="logo-text">MindMate</div>
            </div>
            <h1>Breathe.<br>Focus. Thrive.</h1>
            <p class="subtitle">Your intelligent Web companion for academic wellness. Powered by Azure AI to help you manage stress, organise schedules, and find balance.</p>

            <div class="action-buttons">
                <a href="chat.html" class="btn-base btn-primary">Start Chat</a>
                <a href="dashboard.html" class="btn-base btn-secondary">Dashboard</a>
            </div>
            <p class="footer-note">Deployed on Azure Web Apps | Private and Secure</p>
        </div>

        <div class="hero-visual">
            <div class="blob green"></div>
            <div class="blob purple"></div>
            <div class="glass-card">
                <h3>Clear your mind.<br>We handle the rest.</h3>
            </div>
        </div>
    </div>
    <script>
        window.MINDMATE_API_BASE_URL = 'https://func-mindmate-dev-fehce4g0hnfaahgf.canadacentral-01.azurewebsites.net/api';
    </script>
    <script src="app.js?v=20260331-2"></script>
    <script>
        MindMateApp.ensureUserId();
    </script>
</body>
</html>
