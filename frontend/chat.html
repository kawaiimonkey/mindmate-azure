<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - MindMate</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --sage: #8BAF93; --charcoal: #2D2D2D; --cream: #FAF7F2; --sidebar-w: 260px; --danger-bg: rgba(217, 83, 79, 0.14); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: var(--cream); height: 100vh; display: flex; }
        .sidebar {
            width: var(--sidebar-w); background: white; border-right: 1px solid #E5E5E5;
            padding: 30px 20px; display: flex; flex-direction: column; gap: 30px;
        }
        .brand { font-size: 1.4rem; font-weight: bold; color: var(--charcoal); display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; flex-direction: column; gap: 10px; }
        .nav-links a {
            text-decoration: none; color: #555; font-weight: 500; padding: 12px 16px;
            border-radius: 10px; transition: 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .nav-links a:hover { background: #F5F5F5; }
        .nav-links a.active { background: #F0F5F2; color: var(--sage); }
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        .chat-container { max-width: 900px; width: 100%; margin: 0 auto; flex: 1; display: flex; flex-direction: column; }
        .status-banner {
            margin: 20px 20px 0; padding: 12px 16px; border-radius: 12px;
            background: rgba(139, 175, 147, 0.12); color: var(--charcoal); font-size: 0.92rem;
        }
        .status-banner.error { background: var(--danger-bg); }
        .chat-scroll { flex: 1; overflow-y: auto; padding: 24px 20px 40px; display: flex; flex-direction: column; gap: 20px; }
        .msg-row { display: flex; align-items: flex-end; gap: 15px; }
        .msg-row.user { flex-direction: row-reverse; }
        .avatar {
            width: 36px; height: 36px; background: var(--sage); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .bubble { max-width: 70%; padding: 16px 20px; border-radius: 20px; font-size: 1rem; line-height: 1.6; }
        .bot .bubble { background: white; color: var(--charcoal); border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .user .bubble { background: var(--sage); color: white; border-bottom-right-radius: 4px; }
        .input-wrap { padding: 20px; margin-bottom: 20px; display: flex; gap: 15px; }
        .input-wrap input {
            flex: 1; border: 1px solid #DDD; border-radius: 12px; padding: 16px 20px;
            outline: none; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .input-wrap input:focus { border-color: var(--sage); }
        .send-btn {
            background: var(--sage); color: white; border: none; padding: 0 30px;
            border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem;
        }
        .send-btn:disabled { opacity: 0.6; cursor: wait; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand">MindMate</div>
        <div class="nav-links">
            <a href="chat.html" class="active">AI Check-in</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="index.html" style="margin-top: auto; color: #999;" onclick="MindMateApp.clearSession()">Log out</a>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-container">
            <div class="status-banner" id="chat-status"></div>

            <div class="chat-scroll" id="chat-box">
                <div class="msg-row bot">
                    <div class="avatar">M</div>
                    <div class="bubble">Welcome back. How are you feeling about your workload today? I'm here to listen.</div>
                </div>
            </div>

            <div class="input-wrap">
                <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        window.MINDMATE_API_BASE_URL = 'https://func-mindmate-dev-fehce4g0hnfaahgf.canadacentral-01.azurewebsites.net/api';
    </script>
    <script src="app.js?v=20260331-2"></script>
    <script>
        const userId = MindMateApp.ensureUserId();
        const chatBox = document.getElementById('chat-box');
        const statusBanner = document.getElementById('chat-status');
        const input = document.getElementById('user-input');
        const sendButton = document.getElementById('send-btn');
        const conversation = [];

        function escapeHtml(value) {
            return value
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function renderMessage(role, content) {
            const safeContent = escapeHtml(content).replaceAll('\n', '<br>');
            const rowClass = role === 'user' ? 'msg-row user' : 'msg-row bot';
            const avatar = role === 'user' ? '' : '<div class="avatar">M</div>';

            chatBox.insertAdjacentHTML(
                'beforeend',
                `<div class="${rowClass}">${avatar}<div class="bubble">${safeContent}</div></div>`
            );
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setStatus(message, isError = false) {
            const apiBaseUrl = MindMateApp.getApiBaseUrl();
            statusBanner.textContent = message || `Connected user: ${userId} | API: ${apiBaseUrl || 'not configured'}`;
            statusBanner.classList.toggle('error', isError);
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || sendButton.disabled) return;

            const apiBaseUrl = MindMateApp.getApiBaseUrl();
            if (!apiBaseUrl) {
                setStatus('API base URL is not configured yet. Set it before calling the Function App.', true);
                return;
            }

            renderMessage('user', text);
            conversation.push({ role: 'user', content: text });
            input.value = '';
            sendButton.disabled = true;
            setStatus('MindMate is thinking...');

            try {
                const response = await fetch(`${apiBaseUrl}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId,
                        messages: conversation
                    })
                });

                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.details || payload.error || 'Chat request failed.');
                }

                const reply = payload?.data?.content || 'I received the request, but no reply text came back.';
                conversation.push({ role: 'assistant', content: reply });
                renderMessage('assistant', reply);
                setStatus(`Connected user: ${userId} | API: ${apiBaseUrl}`);
            } catch (error) {
                const message = error instanceof Error ? error.message : 'Unknown error';
                setStatus(`Chat request failed: ${message}`, true);
            } finally {
                sendButton.disabled = false;
                input.focus();
            }
        }

        setStatus();
    </script>
</body>
</html>
